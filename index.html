<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Store UI</title>
  <link href="output.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

  <!-- HEADER -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between p-4">

      <!-- Logo -->
      <div class="text-xl font-bold">
        NEXT <span class="text-pink-500">STORE</span>
      </div>

      <!-- Search -->
      <div class="flex items-center gap-2 w-1/2">
        <button class="bg-blue-500 text-white px-4 py-2 rounded-lg flex items-center gap-2">
          ☰ KATALOG
        </button>

        <div class="relative w-full">
          <input 
            type="text" 
            placeholder="Maxsulotlarni izlash"
            class="w-full border rounded-lg px-4 py-2 pr-10 focus:outline-none"
          >
          <span class="absolute right-3 top-2.5 text-gray-400">🔍</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-4">
        <button>❤️</button>
        <button>🛒</button>
        <button class="bg-gray-200 px-4 py-2 rounded-lg">Kirish</button>
      </div>

    </div>
  </header>

  <!-- BANNER -->
  <section class="max-w-7xl mx-auto mt-6 px-4">
    <div class="bg-green-600 rounded-2xl p-8 flex items-center justify-between text-white overflow-hidden">

      <!-- Text -->
      <div class="max-w-md">
        <h1 class="text-3xl font-bold mb-3 leading-snug">
          Mahsulot narxidan <br> 1% qaytaramiz
        </h1>
        <p class="opacity-90">
          alif nasiya orqali muddatli to'lov uchun 1% keshbek
        </p>
      </div>

      <!-- IMAGE -->
      <div class="hidden md:block">
        <img 
          src="/images/banner.png" 
          alt="banner"
          class="w-56 object-contain"
        >
      </div>

    </div>

    <!-- SLIDER DOTS -->
    <div class="flex justify-center gap-2 mt-4">
      <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
      <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
      <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
      <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
    </div>
  </section>

  <!-- CATEGORIES -->
  <section class="max-w-7xl mx-auto mt-8 px-4">
    <h2 class="text-xl font-semibold mb-4">Kategoriyalar</h2>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-8 gap-4">

      <!-- CATEGORY ITEM -->
      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition cursor-pointer">
        <img src="/images/phone.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Smartfonlar</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/laptop.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Kompyuterlar</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/tv.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Televizorlar</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/watch.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Aqlli soatlar</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/airpods.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Quloqchinlar</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/ac.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Konditsioner</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/fridge.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Sovutkichlar</p>
      </div>

      <div class="bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition">
        <img src="/images/wash.png" class="w-16 h-16 mx-auto object-contain mb-2">
        <p class="text-sm">Kir yuvish</p>
      </div>

    </div>

    <!-- BUTTON -->
    <div class="mt-6">
      <button class="w-full bg-gray-200 py-3 rounded-xl">
        Batafsil
      </button>
    </div>

  </section>

</body>
</html>
